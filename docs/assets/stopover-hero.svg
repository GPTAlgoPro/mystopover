<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">DragonPass Stopover Concierge hero visual</title>
  <desc id="desc">A bilingual hackathon hero diagram showing lounge anchor, baggage custody, city micro-tour and missed-flight assurance.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eaf4ff"/>
      <stop offset="0.55" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fff1e5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0b2b5f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="url(#sky)"/>
  <path d="M96 545 C260 410 438 478 596 338 C790 166 1008 178 1298 82" fill="none" stroke="#0b5fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 18" opacity="0.45"/>
  <g transform="translate(1210 96) rotate(-18)">
    <path d="M0 26 L112 0 L88 36 L116 55 L105 70 L74 54 L42 91 L32 82 L48 42 L0 26Z" fill="#0b5fff"/>
    <path d="M46 42 L88 36" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="82" width="638" height="596" rx="28" fill="url(#card)" stroke="#d6e5fb"/>
    <rect x="112" y="110" width="124" height="34" rx="17" fill="#0b5fff"/>
    <text x="134" y="133" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">v0.1.0 Demo</text>
    <text x="112" y="210" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#09234d">龙腾中转礼遇</text>
    <text x="112" y="260" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#0b5fff">DragonPass Stopover Concierge</text>
    <text x="112" y="322" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2a44">把 6-48 小时机场等待升级为轻量级目的地体验</text>
    <text x="112" y="361" font-family="Inter, Arial, sans-serif" font-size="21" fill="#526173">Turn a 6-48h layover into a confident mini-destination experience.</text>

    <g transform="translate(112 422)">
      <rect width="168" height="112" rx="18" fill="#eef6ff" stroke="#b8d7ff"/>
      <circle cx="34" cy="36" r="16" fill="#0b5fff"/>
      <rect x="24" y="54" width="58" height="18" rx="9" fill="#0b5fff" opacity="0.18"/>
      <text x="24" y="88" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#09234d">休息室信任锚</text>
      <text x="24" y="108" font-family="Inter, Arial, sans-serif" font-size="13" fill="#526173">Lounge anchor</text>
    </g>
    <g transform="translate(306 422)">
      <rect width="168" height="112" rx="18" fill="#fff7ed" stroke="#ffd0a8"/>
      <rect x="24" y="24" width="42" height="46" rx="8" fill="#ff8a3d"/>
      <path d="M32 24 V14 H58 V24" fill="none" stroke="#ff8a3d" stroke-width="7" stroke-linecap="round"/>
      <circle cx="34" cy="78" r="5" fill="#9a4300"/>
      <circle cx="58" cy="78" r="5" fill="#9a4300"/>
      <text x="24" y="88" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#09234d">行李全托管</text>
      <text x="24" y="108" font-family="Inter, Arial, sans-serif" font-size="13" fill="#526173">RFID custody</text>
    </g>
    <g transform="translate(500 422)">
      <rect width="168" height="112" rx="18" fill="#eefdf5" stroke="#b7efcf"/>
      <path d="M28 66 L58 30 L86 66 Z" fill="#15a46b"/>
      <rect x="36" y="66" width="58" height="12" rx="6" fill="#15a46b"/>
      <text x="24" y="88" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#09234d">城市微游</text>
      <text x="24" y="108" font-family="Inter, Arial, sans-serif" font-size="13" fill="#526173">City micro-tour</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="786" y="120" width="518" height="488" rx="28" fill="#ffffff" stroke="#dbe8f8"/>
    <text x="826" y="174" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#09234d">Hackathon Demo Loop</text>
    <text x="826" y="210" font-family="Inter, Arial, sans-serif" font-size="19" fill="#526173">Concierge chat -> package -> voucher -> live journey -> assurance</text>

    <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#09234d" font-weight="700">
      <rect x="826" y="260" width="404" height="54" rx="16" fill="#eef6ff"/>
      <text x="852" y="294">1. AI 礼宾理解中转意图 / Intent</text>
      <rect x="826" y="330" width="404" height="54" rx="16" fill="#fff7ed"/>
      <text x="852" y="364">2. 三档套餐匹配 / SKU Match</text>
      <rect x="826" y="400" width="404" height="54" rx="16" fill="#eefdf5"/>
      <text x="852" y="434">3. QR 凭证 + RFID / Voucher</text>
      <rect x="826" y="470" width="404" height="54" rx="16" fill="#f5f3ff"/>
      <text x="852" y="504">4. 行李追踪 / Baggage Timeline</text>
      <rect x="826" y="540" width="404" height="54" rx="16" fill="#fff1f2"/>
      <text x="852" y="574">5. 误机保障 / Missed-flight SOP</text>
    </g>
  </g>

  <g transform="translate(96 706)" font-family="Inter, Arial, sans-serif" font-size="18" fill="#526173">
    <text>Positioning: lounge as trust anchor + baggage custody + modular city services.</text>
  </g>
</svg>
